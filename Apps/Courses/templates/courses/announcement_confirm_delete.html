{% extends 'base.html' %}
{% block title %}Delete Announcement{% endblock %}
{% block page_header %}<div class="page-header"><h1 class="page-title text-danger"><i class="fas fa-trash me-2"></i>Delete Announcement</h1></div>{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="card shadow-sm border-danger"><div class="card-body p-4 text-center">
  <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
  <h5>Delete <strong>"{{ object.title }}"</strong>?</h5>
  <p class="text-muted">This announcement will be permanently removed.</p>
  <form method="post" class="d-flex gap-2 justify-content-center mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i>Delete</button>
    <a href="{% url 'courses:announcement_list' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div></div>
</div></div>
{% endblock %}
